<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vaibhav & Aarti — Engagement Invitation</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />

<style>
  /* Reset & base */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
    overflow-x: hidden;
    color: #4a0033;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* Heading */
  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 4rem;
    color: #a1004a;
    text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.7);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeInUp 1.2s forwards;
  }

  /* Intro text */
  #intro {
    font-size: 1.3rem;
    max-width: 400px;
    text-align: center;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeInUp 1.2s 0.5s forwards;
    line-height: 1.5;
  }

  /* Countdown container */
  #countdown {
    display: flex;
    gap: 25px;
    background: rgba(255, 255, 255, 0.8);
    padding: 20px 35px;
    border-radius: 35px;
    box-shadow: 0 6px 20px rgba(201, 0, 89, 0.4);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeInUp 1.2s 1s forwards;
  }

  /* Each countdown block */
  .countdown-unit {
    flex: 1;
    text-align: center;
    font-weight: 600;
    cursor: default;
    transition: transform 0.3s ease;
    user-select: none;
  }
  .countdown-unit:hover {
    transform: scale(1.1);
  }
  .countdown-number {
    font-size: 3.2rem;
    font-family: 'Great Vibes', cursive;
    color: #a1004a;
    text-shadow: 1px 1px 5px rgba(201, 0, 89, 0.7);
  }
  .countdown-label {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
    color: #7a0035;
  }

  /* Buttons container */
  .buttons {
    display: flex;
    gap: 25px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeInUp 1.2s 1.5s forwards;
  }
  .btn {
    background: #a1004a;
    color: #fff;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 15px 35px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 6px 15px rgba(201, 0, 89, 0.5);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .btn:hover {
    background: #7a0035;
    transform: scale(1.1);
  }
  .btn i {
    font-size: 1.4rem;
  }

  /* Message */
  .message {
    font-size: 1.25rem;
    max-width: 380px;
    text-align: center;
    font-style: italic;
    color: #7a0035;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeInUp 1.2s 2s forwards;
    line-height: 1.4;
  }

  /* Contact icons */
  .contact {
    display: flex;
    gap: 40px;
    justify-content: center;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeInUp 1.2s 2.5s forwards;
  }
  .contact a {
    font-size: 2.8rem;
    color: #a1004a;
    transition: transform 0.25s ease;
  }
  .contact a.whatsapp {
    color: #25d366;
  }
  .contact a.call {
    color: #007bff;
  }
  .contact a:hover {
    transform: scale(1.3);
  }

  /* Floating hearts and petals */
  .floating {
    position: fixed;
    pointer-events: none;
    user-select: none;
    z-index: 0;
    font-size: 24px;
    animation-timing-function: linear;
  }
  .heart {
    color: #ff69b4;
    animation-name: floatUp;
  }
  .petal {
    color: #ff6f91;
    animation-name: floatUpPetal;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh) rotate(360deg);
      opacity: 0;
    }
  }
  @keyframes floatUpPetal {
    0% {
      transform: translateY(0) rotate(0deg) translateX(0);
      opacity: 1;
    }
    100% {
      transform: translateY(-110vh) rotate(720deg) translateX(50px);
      opacity: 0;
    }
  }

  /* FadeInUp animation */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Responsive */
  @media (max-width: 480px) {
    h1 {
      font-size: 2.8rem;
    }
    #intro {
      font-size: 1.1rem;
      max-width: 90%;
    }
    #countdown {
      flex-direction: column;
      gap: 15px;
      padding: 20px 25px;
      border-radius: 25px;
    }
    .countdown-unit {
      font-size: 1rem;
    }
    .countdown-number {
      font-size: 2.4rem;
    }
    .buttons {
      flex-direction: column;
      gap: 20px;
    }
    .btn {
      width: 100%;
      justify-content: center;
      font-size: 1rem;
      padding: 12px 0;
    }
    .message {
      font-size: 1.1rem;
      max-width: 95%;
    }
    .contact a {
      font-size: 2.3rem;
    }
  }
</style>
</head>
<body>

  <h1>Vaibhav & Aarti</h1>
  <div id="intro"></div>

  <div id="countdown">
    <div class="countdown-unit">
      <div id="days" class="countdown-number">0</div>
      <div class="countdown-label">Days</div>
    </div>
    <div class="countdown-unit">
      <div id="hours" class="countdown-number">0</div>
      <div class="countdown-label">Hours</div>
    </div>
    <div class="countdown-unit">
      <div id="minutes" class="countdown-number">0</div>
      <div class="countdown-label">Minutes</div>
    </div>
    <div class="countdown-unit">
      <div id="seconds" class="countdown-number">0</div>
      <div class="countdown-label">Seconds</div>
    </div>
  </div>

  <div class="buttons">
    <a href="https://maps.app.goo.gl/FEnFQJp2pfHZmMyS7" target="_blank" class="btn">
      <i class="fas fa-map-marker-alt"></i> Venue
    </a>
    <a href="assets/invite-card.jpeg" download class="btn">
      <i class="fas fa-file-download"></i> Download Invite
    </a>
  </div>

  <div class="message">
    We can’t wait to celebrate our engagement with you!<br />
    Your presence and blessings will mean the world to us.<br /><br />
    💖 Join us as we begin our forever 💖
  </div>

  <div class="contact">
    <a href="https://wa.me/917030888685" target="_blank" class="whatsapp" aria-label="WhatsApp">
      <i class="fab fa-whatsapp"></i>
    </a>
    <a href="tel:+917030888685" class="call" aria-label="Call">
      <i class="fas fa-phone-alt"></i>
    </a>
  </div>

  <!-- Floating hearts and petals container -->
  <div id="floating-container"></div>

  <audio id="bg-music" src="assets/song.mp3" autoplay loop playsinline></audio>

  <script src="https://unpkg.com/typeit@8.7.0/dist/index.umd.js"></script>
  <script>
    // Typewriter intro text
    new TypeIt('#intro', {
      strings: ["We are delighted to invite you to our engagement ceremony."],
      speed: 50,
      waitUntilVisible: true
    }).go();

    // Countdown
    const eventTime = new Date('2025-08-17T18:00:00').getTime();
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    function updateCountdown() {
      const now = Date.now();
      const diff = eventTime - now;

      if (diff <= 0) {
        clearInterval(countdownInterval);
        document.getElementById('countdown').innerHTML = `<div style="font-size:1.8rem; color:#a1004a; font-family:'Great Vibes', cursive;">
          Today is the day! 🎉</div>`;
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      daysEl.textContent = days;
      hoursEl.textContent = hours.toString().padStart(2, '0');
      minutesEl.textContent = minutes.toString().padStart(2, '0');
      secondsEl.textContent = seconds.toString().padStart(2, '0');
    }
    updateCountdown();
    const countdownInterval = setInterval(updateCountdown, 1000);

    // Floating hearts and petals animation
    const floatingContainer = document.getElementById('floating-container');

    function createFloating(type) {
      const el = document.createElement('div');
      el.classList.add('floating');
      if (type === 'heart') {
        el.classList.add('heart');
        el.textContent = '❤️';
      } else {
        el.classList.add('petal');
        el.textContent = '🌸';
      }
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (12 + Math.random() * 20) + 'px';
      el.style.animationDuration = (6 + Math.random() * 6) + 's';
      el.style.animationDelay = '0s';
      floatingContainer.appendChild(el);

      el.addEventListener('animationend', () => el.remove());
    }

    setInterval(() => createFloating('heart'), 1200);
    setInterval(() => createFloating('petal'), 1500);

    // Optional: Unmute audio after user interaction (due to browser restrictions)
    const audio = document.getElementById('bg-music');
    document.body.addEventListener('click', () => {
      if (audio.paused) {
        audio.muted = false;
        audio.play();
      }
    }, { once: true });
  </script>
</body>
</html>
